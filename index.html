<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        FFC PATCH TOOL
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="card">

            <h1>
                FFC PATCH TOOL
            </h1>

            <div class="desc">
            
                This tool only works for maps
                created using the supported
                function structure and exact
                coding format.
            
                <br><br>
            
                Unsupported map structures
                may fail to patch correctly.
            
            </div>
            
            <div class="tutorial">
            
                <a
                href="https://youtu.be/-qVME_uLmiQ"
                target="_blank">
            
                    WATCH TUTORIAL VIDEO
            
                </a>
            
            </div>

            <label>
                Select ZIP File
            </label>

            <input
            type="file"
            id="zipInput"
            accept=".zip">

            <div id="uidContainer"></div>

            <button
            id="patchBtn"
            disabled>

                PATCH & DOWNLOAD ZIP

            </button>
            
            <div class="log" id="log"></div>

            <div class="socials">

                <a
                href="https://youtube.com/@demonsubdueryt"
                target="_blank"
                class="yt">

                    YOUTUBE

                </a>

                <a
                href="https://t.me/freefirecraftlandgroupx"
                target="_blank"
                class="tg">

                    TELEGRAM

                </a>
            </div>

            

        </div>

    </div>

    <script src="spark-md5.min.js"></script>

    <script src="jszip.min.js"></script>

    <script src="server.js"></script>

</body>

</html>
